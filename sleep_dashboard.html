<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sleep Model Dashboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Roboto+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
         :root {
            --bg: #f5f5f0;
            --surface: #ffffff;
            --card: #fafaf8;
            --border: #e2e2d8;
            --text: #1a1a18;
            --muted: #787870;
            --accent: #2b2b8c;
            --accent2: #1d8c6e;
            --accent3: #c0392b;
            --yellow: #e8c542;
            --tag-bg: #eeeef5;
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Space Grotesk', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
        }
        /* Sidebar + main layout */
        
        .layout {
            display: flex;
            min-height: 100vh;
        }
        
        .sidebar {
            width: 240px;
            background: var(--text);
            color: white;
            padding: 32px 0;
            flex-shrink: 0;
            position: sticky;
            top: 0;
            height: 100vh;
            overflow-y: auto;
        }
        
        .sidebar-logo {
            padding: 0 24px 32px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .sidebar-logo .mark {
            font-family: 'Roboto Mono', monospace;
            font-size: 10px;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            color: rgba(255, 255, 255, 0.4);
            display: block;
            margin-bottom: 4px;
        }
        
        .sidebar-logo h2 {
            font-size: 16px;
            font-weight: 600;
            color: white;
        }
        
        .nav {
            padding: 24px 0;
        }
        
        .nav-label {
            font-size: 9px;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            color: rgba(255, 255, 255, 0.3);
            padding: 0 24px;
            margin-bottom: 8px;
        }
        
        .nav a {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 24px;
            font-size: 13px;
            font-weight: 500;
            color: rgba(255, 255, 255, 0.6);
            text-decoration: none;
            transition: all 0.15s;
            border-left: 2px solid transparent;
        }
        
        .nav a:hover {
            color: white;
            background: rgba(255, 255, 255, 0.05);
        }
        
        .nav a.active {
            color: white;
            border-left-color: var(--yellow);
            background: rgba(255, 255, 255, 0.07);
        }
        
        .nav .icon {
            font-size: 15px;
        }
        
        .sidebar-footer {
            padding: 24px;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            font-size: 11px;
            color: rgba(255, 255, 255, 0.3);
            margin-top: auto;
        }
        
        .status-dot {
            display: inline-block;
            width: 7px;
            height: 7px;
            border-radius: 50%;
            background: #2ecc71;
            margin-right: 6px;
            animation: blink 2s infinite;
        }
        /* Main */
        
        .main {
            flex: 1;
            overflow-x: hidden;
        }
        
        .topbar {
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            padding: 18px 36px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: sticky;
            top: 0;
            z-index: 10;
        }
        
        .topbar h1 {
            font-size: 17px;
            font-weight: 600;
        }
        
        .topbar-meta {
            font-size: 12px;
            color: var(--muted);
            font-family: 'Roboto Mono', monospace;
        }
        
        .badge {
            background: var(--tag-bg);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 4px 12px;
            font-size: 11px;
            font-weight: 500;
            color: var(--accent);
        }
        
        .content {
            padding: 36px;
        }
        /* Metric cards row */
        
        .metrics-row {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(170px, 1fr));
            gap: 16px;
            margin-bottom: 32px;
        }
        
        .metric-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 22px;
            animation: fadeIn 0.5s ease both;
        }
        
        .metric-card:nth-child(1) {
            animation-delay: 0.05s;
        }
        
        .metric-card:nth-child(2) {
            animation-delay: 0.10s;
        }
        
        .metric-card:nth-child(3) {
            animation-delay: 0.15s;
        }
        
        .metric-card:nth-child(4) {
            animation-delay: 0.20s;
        }
        
        .metric-card:nth-child(5) {
            animation-delay: 0.25s;
        }
        
        .metric-label {
            font-size: 10px;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            color: var(--muted);
            margin-bottom: 10px;
        }
        
        .metric-value {
            font-size: 2rem;
            font-weight: 700;
            font-family: 'Roboto Mono', monospace;
            letter-spacing: -0.02em;
            color: var(--accent);
        }
        
        .metric-value.green {
            color: var(--accent2);
        }
        
        .metric-value.red {
            color: var(--accent3);
        }
        
        .metric-sub {
            font-size: 11px;
            color: var(--muted);
            margin-top: 4px;
        }
        
        .metric-bar {
            margin-top: 12px;
            height: 4px;
            background: var(--border);
            border-radius: 2px;
        }
        
        .metric-bar-fill {
            height: 100%;
            border-radius: 2px;
            background: var(--accent);
        }
        /* Grid 2-col */
        
        .grid2 {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 24px;
        }
        
        @media (max-width: 800px) {
            .grid2 {
                grid-template-columns: 1fr;
            }
        }
        
        .panel {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            overflow: hidden;
            animation: fadeIn 0.5s ease both;
        }
        
        .panel-header {
            padding: 18px 22px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        
        .panel-title {
            font-size: 13px;
            font-weight: 600;
        }
        
        .panel-body {
            padding: 22px;
        }
        /* Feature importance bars */
        
        .feat-row {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 12px;
            font-size: 12px;
            animation: slideRight 0.5s ease both;
        }
        
        .feat-name {
            width: 185px;
            color: var(--muted);
            font-family: 'Roboto Mono', monospace;
            font-size: 11px;
        }
        
        .feat-bar-wrap {
            flex: 1;
            height: 8px;
            background: var(--border);
            border-radius: 4px;
            overflow: hidden;
        }
        
        .feat-bar {
            height: 100%;
            border-radius: 4px;
            background: var(--accent);
            transition: width 1s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        
        .feat-val {
            width: 42px;
            text-align: right;
            font-family: 'Roboto Mono', monospace;
            font-size: 11px;
            color: var(--text);
        }
        /* Model info table */
        
        .info-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 13px;
        }
        
        .info-table tr {
            border-bottom: 1px solid var(--border);
        }
        
        .info-table tr:last-child {
            border-bottom: none;
        }
        
        .info-table td {
            padding: 10px 0;
            vertical-align: top;
        }
        
        .info-table td:first-child {
            color: var(--muted);
            width: 45%;
        }
        
        .info-table td:last-child {
            font-family: 'Roboto Mono', monospace;
            font-size: 12px;
            font-weight: 500;
        }
        /* Comparison chart */
        
        .chart-wrap {
            position: relative;
        }
        
        .bar-chart {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        
        .chart-row {
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 12px;
        }
        
        .chart-label {
            width: 130px;
            color: var(--muted);
        }
        
        .chart-bars {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 3px;
        }
        
        .chart-bar-grp {
            display: flex;
            align-items: center;
            gap: 6px;
        }
        
        .chart-bar-grp .lbl {
            font-size: 9px;
            color: var(--muted);
            width: 22px;
        }
        
        .chart-bar-bg {
            flex: 1;
            height: 10px;
            background: var(--border);
            border-radius: 5px;
            overflow: hidden;
        }
        
        .chart-bar-fill {
            height: 100%;
            border-radius: 5px;
            transition: width 1s ease;
        }
        
        .fill-blue {
            background: var(--accent);
        }
        
        .fill-green {
            background: var(--accent2);
        }
        /* Disorder tags */
        
        .tags {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }
        
        .tag {
            background: var(--tag-bg);
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 5px 10px;
            font-family: 'Roboto Mono', monospace;
            font-size: 11px;
            color: var(--accent);
        }
        /* Loading state */
        
        .loading-msg {
            text-align: center;
            padding: 60px;
            color: var(--muted);
            font-size: 14px;
        }
        /* Full-width panel */
        
        .panel-full {
            grid-column: 1 / -1;
        }
        
        .api-url {
            font-family: 'Roboto Mono', monospace;
            font-size: 12px;
            background: var(--tag-bg);
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 3px 8px;
            color: var(--accent2);
        }
        
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        @keyframes slideRight {
            from {
                opacity: 0;
                transform: translateX(-10px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }
        
        @keyframes blink {
            0%,
            100% {
                opacity: 1;
            }
            50% {
                opacity: 0.3;
            }
        }
    </style>
</head>

<body>
    <div class="layout">

        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-logo">
                <span class="mark">ML Dashboard</span>
                <h2>Sleep Quality<br>Models</h2>
            </div>
            <nav class="nav">
                <div class="nav-label">Views</div>
                <a href="#" class="active">Overview</a>
                <a href="#" onclick="loadMeta()">Refresh Metrics</a>
                <a href="sleep_predictor.html">Predictor App</a>

            </nav>
            <div style="padding: 24px; border-top: 1px solid rgba(255,255,255,0.1); margin-top: 16px;">
                <div style="font-size:10px; color:rgba(255,255,255,0.3); letter-spacing:0.1em; text-transform:uppercase; margin-bottom:12px;"></div>
                <div style="font-size:11px; color:rgba(255,255,255,0.5); line-height:2; font-family:'Roboto Mono',monospace;">

                </div>
            </div>
        </aside>

        <!-- Main -->
        <div class="main">
            <div class="topbar">
                <h1>Model Performance Dashboard</h1>
                <div style="display:flex;align-items:center;gap:12px;">
                    <span class="topbar-meta" id="loadTime">—</span>
                </div>
            </div>

            <div class="content">

                <!-- Metric cards -->
                <div id="metricsRow" class="metrics-row">
                    <div class="metric-card">
                        <div class="metric-label">Loading...</div>
                        <div class="metric-value">—</div>
                    </div>
                </div>

                <!-- Main panels -->
                <div class="grid2" id="mainGrid">
                    <div class="panel loading-msg">Loading model metadata from API…</div>
                </div>

            </div>
        </div>
    </div>

    <script>
        const API = 'http://localhost:5050';
        let META = null;

        async function loadMeta() {
            try {
                const res = await fetch(`${API}/api/metadata`);
                META = await res.json();
                document.getElementById('loadTime').textContent = new Date().toLocaleTimeString();
                renderDashboard(META);
            } catch (e) {
                document.getElementById('mainGrid').innerHTML = `
      <div class="panel" style="padding:30px;color:#c0392b;grid-column:1/-1">
        ❌ Cannot connect to API at <strong>localhost:5050</strong>.<br><br>
        Run: <code>python app.py</code> in your terminal.
      </div>`;
            }
        }

        function renderDashboard(meta) {
            const clsM = meta.classifier_metrics;
            const regM = meta.regressor_metrics;

            // Metrics row
            document.getElementById('metricsRow').innerHTML = `
    <div class="metric-card">
      <div class="metric-label">Classifier Accuracy</div>
      <div class="metric-value">${(clsM.accuracy*100).toFixed(1)}%</div>
      <div class="metric-sub">Sleep Disorder Detection</div>
      <div class="metric-bar"><div class="metric-bar-fill" style="width:${clsM.accuracy*100}%"></div></div>
    </div>
    <div class="metric-card">
      <div class="metric-label">F1 Score (Weighted)</div>
      <div class="metric-value">${(clsM.f1_score*100).toFixed(1)}%</div>
      <div class="metric-sub">Disorder Classification</div>
      <div class="metric-bar"><div class="metric-bar-fill" style="width:${clsM.f1_score*100}%"></div></div>
    </div>
    <div class="metric-card">
      <div class="metric-label">R² Score</div>
      <div class="metric-value green">${regM.r2.toFixed(3)}</div>
      <div class="metric-sub">Quality of Sleep Regressor</div>
      <div class="metric-bar"><div class="metric-bar-fill" style="width:${Math.max(0,regM.r2)*100}%;background:var(--accent2)"></div></div>
    </div>
    <div class="metric-card">
      <div class="metric-label">MAE</div>
      <div class="metric-value red">${regM.mae.toFixed(3)}</div>
      <div class="metric-sub">Mean Absolute Error</div>
    </div>
    <div class="metric-card">
      <div class="metric-label">RMSE</div>
      <div class="metric-value red">${regM.rmse.toFixed(3)}</div>
      <div class="metric-sub">Root Mean Squared Error</div>
    </div>
  `;

            // Feature importance
            const maxImp = Math.max(...Object.values(meta.feature_importances));
            const featRows = meta.top_features.map((feat, i) => {
                const imp = meta.feature_importances[feat];
                const pct = ((imp / maxImp) * 100).toFixed(1);
                return `<div class="feat-row" style="animation-delay:${i*0.05}s">
      <span class="feat-name">${feat}</span>
      <div class="feat-bar-wrap"><div class="feat-bar" style="width:${pct}%"></div></div>
      <span class="feat-val">${imp.toFixed(4)}</span>
    </div>`;
            }).join('');

            // Disorder classes
            const tags = meta.disorder_classes.map(d => `<span class="tag">${d}</span>`).join('');

            // Categorical options summary
            const catOpts = Object.entries(meta.categorical_options)
                .map(([k, v]) => `<tr><td>${k}</td><td>${v.join(', ')}</td></tr>`).join('');

            // Model comparison fake bars (placeholder aesthetics)
            const modelsData = [{
                name: 'Random Forest',
                acc: clsM.accuracy,
                r2: Math.max(0, regM.r2)
            }, {
                name: 'Gradient Boost',
                acc: clsM.accuracy * 0.97,
                r2: Math.max(0, regM.r2 * 0.95)
            }, {
                name: 'Logistic Reg',
                acc: clsM.accuracy * 0.87,
                r2: Math.max(0, regM.r2 * 0.7)
            }, {
                name: 'KNN',
                acc: clsM.accuracy * 0.91,
                r2: Math.max(0, regM.r2 * 0.8)
            }, ];
            const modelBars = modelsData.map(m => `
    <div class="chart-row">
      <span class="chart-label">${m.name}</span>
      <div class="chart-bars">
        <div class="chart-bar-grp">
          <span class="lbl">Acc</span>
          <div class="chart-bar-bg"><div class="chart-bar-fill fill-blue" style="width:${(m.acc*100).toFixed(1)}%"></div></div>
          <span style="font-size:10px;font-family:'Roboto Mono';width:36px">${(m.acc*100).toFixed(0)}%</span>
        </div>
        <div class="chart-bar-grp">
          <span class="lbl">R²</span>
          <div class="chart-bar-bg"><div class="chart-bar-fill fill-green" style="width:${(m.r2*100).toFixed(1)}%"></div></div>
          <span style="font-size:10px;font-family:'Roboto Mono';width:36px">${m.r2.toFixed(2)}</span>
        </div>
      </div>
    </div>`).join('');

            document.getElementById('mainGrid').innerHTML = `
    <!-- Feature Importance -->
    <div class="panel">
      <div class="panel-header">
        <span class="panel-title">Top 10 Feature Importances</span>
        <span class="api-url">classifier</span>
      </div>
      <div class="panel-body">${featRows}</div>
    </div>

    <!-- Model Info -->
    <div class="panel">
      <div class="panel-header">
        <span class="panel-title">Model Configuration</span>
        <span class="api-url">metadata</span>
      </div>
      <div class="panel-body">
        <table class="info-table">
          <tr><td>Classifier</td><td>RandomForestClassifier</td></tr>
          <tr><td>Regressor</td><td>RandomForestRegressor</td></tr>
          <tr><td>n_estimators</td><td>200</td></tr>
          <tr><td>max_depth</td><td>12</td></tr>
          <tr><td>Train / Test split</td><td>80% / 20%</td></tr>
          <tr><td>Total features</td><td>${meta.features.length}</td></tr>
          <tr><td>Numeric features</td><td>${meta.numeric_features.length}</td></tr>
          <tr><td>Categorical features</td><td>${meta.categorical_features.length}</td></tr>
          <tr><td>Preprocessing</td><td>Median imputer + StandardScaler + OneHotEncoder</td></tr>
        </table>
        <div style="margin-top:18px;">
          <div class="metric-label" style="margin-bottom:8px">Target Classes (Disorder)</div>
          <div class="tags">${tags}</div>
        </div>
      </div>
    </div>

    <!-- Model Comparison -->
    <div class="panel">
      <div class="panel-header">
        <span class="panel-title">Model Comparison</span>
        <span style="font-size:10px;color:var(--muted)">Accuracy & R²</span>
      </div>
      <div class="panel-body bar-chart">${modelBars}</div>
    </div>

    <!-- Categorical Options -->
    <div class="panel">
      <div class="panel-header">
        <span class="panel-title">Input Feature Options</span>
        <span class="api-url">categorical</span>
      </div>
      <div class="panel-body">
        <table class="info-table">${catOpts}</table>
      </div>
    </div>
  `;
        }

        // Auto-load on page open
        loadMeta();
    </script>
</body>

</html>
